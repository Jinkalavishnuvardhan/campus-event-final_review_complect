<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Event Registration Checkout</title>
	<link rel="stylesheet" href="/style.css">
	<style>
		.checkout-container {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 30px;
			margin-top: 20px;
		}
		
		.checkout-card {
			background: var(--card-bg);
			border-radius: 16px;
			padding: 25px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
			border: 1px solid rgba(255, 255, 255, 0.1);
		}
		
		.dark-mode .checkout-card {
			background: #1e293b;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
			border: 1px solid rgba(255, 255, 255, 0.05);
		}

		.checkout-card h3 {
			margin-top: 0;
			color: var(--text-color);
			border-bottom: 2px solid rgba(37, 99, 235, 0.2);
			padding-bottom: 10px;
			margin-bottom: 20px;
		}

		.detail-row {
			display: flex;
			justify-content: space-between;
			margin-bottom: 15px;
			font-size: 1.05rem;
		}

		.detail-label {
			font-weight: 600;
			color: #64748b;
		}
		
		.dark-mode .detail-label {
			color: #94a3b8;
		}

		.detail-value {
			color: var(--text-color);
			text-align: right;
			max-width: 60%;
		}
		
		.amount-display {
			text-align: center;
			margin: 30px 0;
			padding: 20px;
			background: rgba(37, 99, 235, 0.1);
			border-radius: 12px;
		}

		.amount-value {
			font-size: 3rem;
			font-weight: bold;
			color: #2563eb;
			margin: 10px 0;
		}
		
		.dark-mode .amount-value {
			color: #60a5fa;
		}

		@media (max-width: 768px) {
			.checkout-container {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body class="student-page">
	<div class="container">
		<div class="nav" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
			<div>
				<h2 style="margin-bottom: 5px;">Event Checkout</h2>
			</div>
			<div>
				<a href="/student/dashboard" class="btn">Cancel</a>
			</div>
		</div>

		<div class="checkout-container">
			<!-- Event Details Card -->
			<div class="checkout-card">
				<h3>Event Details</h3>
				
				<div style="text-align: center; margin-bottom: 20px;">
					<img th:src="${event.imageUrl}" alt="Event Image" style="width: 100%; height: 180px; object-fit: cover; border-radius: 12px;">
				</div>
				
				<div class="detail-row">
					<span class="detail-label">Title</span>
					<span class="detail-value" th:text="${event.title}"></span>
				</div>
				<div class="detail-row">
					<span class="detail-label">Date & Day</span>
					<span class="detail-value" th:text="${event.date} + ' (' + ${event.day} + ')'"></span>
				</div>
				<div class="detail-row">
					<span class="detail-label">Time</span>
					<span class="detail-value" th:text="${event.time}"></span>
				</div>
				<div class="detail-row">
					<span class="detail-label">Location</span>
					<span class="detail-value" th:text="${event.locationAddress ?: 'TBA'}"></span>
				</div>
			</div>

			<!-- Student Details & Payment Card -->
			<div class="checkout-card">
				<h3>Student Information</h3>
				<div class="detail-row">
					<span class="detail-label">Name</span>
					<span class="detail-value" th:text="${student.name}"></span>
				</div>
				<div class="detail-row">
					<span class="detail-label">Email</span>
					<span class="detail-value" th:text="${student.email}"></span>
				</div>
				<div class="detail-row">
					<span class="detail-label">Department</span>
					<span class="detail-value" th:text="${student.department}"></span>
				</div>
				<div class="detail-row">
					<span class="detail-label">Phone</span>
					<span class="detail-value" th:text="${student.number ?: 'N/A'}"></span>
				</div>

				<div class="amount-display">
					<p style="margin: 0; font-size: 1.2rem; font-weight: bold; color: var(--text-color);">Total Amount to Pay</p>
					<div class="amount-value" th:text="${event.paymentAmount != null ? '₹' + event.paymentAmount : 'Free'}"></div>
					<p style="margin: 0; font-size: 0.9rem; color: #64748b;">Secure payment processed internally</p>
				</div>

				<form th:action="@{'/student/join/' + ${event.id}}" method="post">
					<button type="submit" class="btn btn-success" style="width: 100%; font-size: 1.2rem; padding: 15px;"
							onclick="return confirm('Confirm payment and registration?');">
						Pay Now & Register
					</button>
				</form>
			</div>
		</div>
	</div>
</body>

</html>
